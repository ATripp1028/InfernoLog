name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to staging'
        required: true
        default: 'develop'

jobs:
  deploy-api-staging:
    uses: ./.github/workflows/deploy-api.yml
    with:
      stage: staging
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-web-staging:
    uses: ./.github/workflows/deploy-web.yml
    needs: deploy-api-staging
    with:
      stage: staging
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  verify-staging:
    runs-on: ubuntu-latest
    needs: deploy-web-staging
    steps:
      - name: Verify staging health
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://$(aws ssm get-parameter \
              --name /infernolog/staging/api-url \
              --query Parameter.Value \
              --output text \
              --region us-east-1)/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Staging health check failed with status $RESPONSE"
            exit 1
          fi
          echo "Staging health check passed"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1